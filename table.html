<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquareTech Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
}

/* Card Container */
.container {
    width: 80%;
    max-width: 900px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    margin: 10px 0 5px;
    font-size: 26px;
}

.header p {
    color: gray;
    font-size: 14px;
}

/* Section Title */
.section-title {
    margin: 20px 0 10px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
}

/* Form Grid */
.form-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 10px;
}

.form-row input {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 13px;
}

/* Button */
.button {
    background: #c99a2e;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.button:hover {
    background: #a67c1b;
}

/* Footer */
.footer {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.clear {
    color: gray;
    cursor: pointer;
    font-size: 13px;
}

@media(max-width: 768px) {
    .form-row {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 500px) {
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <h1>SQUARETECH</h1>
        <p>The Future of Excellence...</p>
    </div>

    <!-- User Details -->
    <div class="section-title">1. User Details</div>
    <div class="form-row">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Middle Name">
        <input type="text" placeholder="Last Name">
        <input type="email" placeholder="Email Address">
    </div>

    <div class="form-row">
        <input type="text" placeholder="+91 Phone">
        <input type="text" placeholder="Address Line 1">
        <input type="text" placeholder="Address Line 2">
        <input type="text" placeholder="City">
    </div>

    <div class="form-row">
        <input type="text" placeholder="State">
        <input type="text" placeholder="Pincode">
        <input type="text" placeholder="Country">
    </div>

    <!-- Education -->
    <div class="section-title">2. Education Details</div>
    <div class="form-row">
        <input type="text" placeholder="College Name">
        <input type="text" placeholder="Degree">
        <input type="text" placeholder="Domain">
        <input type="text" placeholder="Passout Year">
    </div>

    <!-- Job -->
    <div class="section-title">3. Job Details</div>
    <div class="form-row">
        <input type="text" placeholder="Company Name">
        <input type="text" placeholder="Experience">
        <input type="text" placeholder="Project Details">
        <input type="text" placeholder="Notice Period">
    </div>

    <!-- Buttons -->
    <div class="footer">
        <button class="button">Submit Details</button>
        <span class="clear">Clear Entire Form</span>
    </div>

</div>

</body>
</html>
